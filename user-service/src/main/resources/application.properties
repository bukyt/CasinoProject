server.port=8086

spring.application.name=user-service

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.instance.preferIpAddress=true
eureka.instance.preferIpAddress=true

spring.datasource.url=jdbc:postgresql://localhost:5432/userservice_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

logging.level.com=INFO

# Springdoc / Swagger UI (defaults; do not set swagger-ui.path to a .html file — use /swagger-ui and open .../index.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.packages-to-scan=com.casino.userservice.users.controller
