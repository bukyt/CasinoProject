server.port=8083
logging.level.com=INFO
spring.application.name=ledger

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ledgerService
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.casino.event
spring.kafka.consumer.properties.spring.json.type.mapping=betplaced:com.casino.event.BetPlaced,depositcompleted:com.casino.event.DepositCompleted,withdrawalprocessed:com.casino.event.WithdrawalProcessed,betsettled:com.casino.event.BetSettled

spring.datasource.url=jdbc:postgresql://localhost:5432/ledger_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
